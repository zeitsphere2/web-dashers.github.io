    <style>
        /* Lock screen overlay */
        #lock-overlay {
            position: fixed;
            inset: 0;
            background: #000000dd;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 99999;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        #lock-box {
            background: #111;
            border-radius: 12px;
            padding: 24px 28px 32px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.6);
            color: #fff;
            min-width: 260px;
            text-align: center;
            position: relative;
        }

        #lock-title {
            font-size: 1.2rem;
            margin-bottom: 12px;
        }

        #lock-input {
            width: 100%;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #000;
            color: #fff;
            font-size: 1rem;
            outline: none;
            box-sizing: border-box;
        }

        #lock-input:focus {
            border-color: #80ED33;
        }

        #lock-button {
            margin-top: 14px;
            width: 100%;
            padding: 10px 12px;
            border-radius: 8px;
            border: none;
            background: #80ED33;
            color: #000;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
        }

        #lock-button:hover {
            filter: brightness(1.1);
        }

        #lock-error {
            margin-top: 10px;
            color: #ff6b6b;
            font-size: 0.85rem;
            min-height: 1em;
        }

        /* Watermark bottom-right */
        #lock-watermark {
            position: fixed;
            right: 10px;
            bottom: 8px;
            color: #ccc;
            font-size: 0.8rem;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            z-index: 100000;
            pointer-events: none;
        }
    </style>

    <script>
        new ResizeObserver(() => {
            window.dispatchEvent(new Event('resize'));
        }).observe(document.documentElement);

        document.oncontextmenu = (event) => {
            event.preventDefault();
        };

        // Simple passcode lock
        const PASSCODE = "393546";

        window.addEventListener("DOMContentLoaded", () => {
            const overlay = document.getElementById("lock-overlay");
            const input = document.getElementById("lock-input");
            const button = document.getElementById("lock-button");
            const error = document.getElementById("lock-error");

            const unlock = () => {
                if (input.value === PASSCODE) {
                    overlay.style.display = "none";
                } else {
                    error.textContent = "Incorrect passcode.";
                }
            };

            button.addEventListener("click", unlock);
            input.addEventListener("keydown", (e) => {
                if (e.key === "Enter") unlock();
            });
        });
    </script>
</head>

<body>
    <!-- Lock overlay -->
    <div id="lock-overlay">
        <div id="lock-box">
            <div id="lock-title">Enter passcode to access Dih</div>
            <input
                id="lock-input"
                type="password"
                inputmode="numeric"
                autocomplete="off"
                placeholder="Passcode"
            />
            <button id="lock-button">Unlock</button>
            <div id="lock-error"></div>
        </div>
    </div>

    <!-- Watermark -->
    <div id="lock-watermark">made by adam s :)</div>
</body>
