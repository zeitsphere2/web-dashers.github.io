    <style>
        /* PASSCODE LOCK */
        #lock-overlay {
            position: fixed;
            inset: 0;
            background: #000000ee;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 999999;
            font-family: system-ui;
        }
        #lock-box {
            background:#111;
            padding:25px;
            border-radius:12px;
            min-width:260px;
            text-align:center;
            color:white;
        }
        #lock-input {
            width:100%;
            padding:10px;
            border-radius:8px;
            border:1px solid #444;
            background:black;
            color:white;
            font-size:16px;
        }
        #lock-button {
            margin-top:12px;
            width:100%;
            padding:10px;
            border-radius:8px;
            background:#80ED33;
            border:none;
            font-weight:600;
            cursor:pointer;
        }
        #lock-error {
            color:#ff6b6b;
            margin-top:10px;
            height:16px;
        }
        #lock-watermark {
            position: fixed;
            right: 10px;
            bottom: 8px;
            color: #ccc;
            font-size: 0.8rem;
            font-family: system-ui;
            z-index: 1000000;
            pointer-events: none;
        }
    </style>

    <script>
        // Prevent right-click
        document.oncontextmenu = e => e.preventDefault();

        // PASSCODE LOGIC
        const PASS = "393546";

        window.addEventListener("DOMContentLoaded", () => {
            const overlay = document.getElementById("lock-overlay");
            const input = document.getElementById("lock-input");
            const button = document.getElementById("lock-button");
            const error = document.getElementById("lock-error");

            function unlock() {
                if (input.value === PASS) {
                    overlay.style.display = "none";
                } else {
                    error.textContent = "Incorrect passcode.";
                }
            }

            button.onclick = unlock;
            input.onkeydown = e => {
                if (e.key === "Enter") unlock();
            };
        });
    </script>
</head>

<body>
    <!-- PASSCODE OVERLAY -->
    <div id="lock-overlay">
        <div id="lock-box">
            <div style="margin-bottom:10px;font-size:18px;">Enter passcode to access Dih</div>
            <input id="lock-input" type="password" placeholder="Passcode">
            <button id="lock-button">Unlock</button>
            <div id="lock-error"></div>
        </div>
    </div>

    <!-- WATERMARK -->
    <div id="lock-watermark">made by adam s :)</div>
</body>
