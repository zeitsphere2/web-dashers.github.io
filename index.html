<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dih</title>

    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    <link rel="stylesheet" href="assets/style.css">

    <!-- Original scripts (unchanged) -->
    <script src="assets/scripts/game/allObjects.js?latest"></script>
    <script src="assets/scripts/game/allLevels.js"></script>
    <script src="assets/scripts/libs/phaser.min.js"></script>
    <script src="assets/scripts/libs/pako.min.js"></script>
    <script src="assets/scripts/utils/cache-manager.js"></script>
    <script src="assets/scripts/api/GDapiWrapper.js"></script>
    <script src="assets/scripts/utils/api-config.js"></script>
    <script src="assets/scripts/api/account-api.js"></script>

    <script>window._gdProxyUrl = "https://gd-proxy.gmdc.workers.dev";</script>

    <script defer src="assets/scripts/utils/config.js"></script>
    <script defer src="assets/scripts/core/triggers.js"></script>
    <script defer src="assets/scripts/core/level.js?latest"></script>
    <script defer src="assets/scripts/core/player.js?latehkjthykhst"></script>
    <script defer src="assets/scripts/core/audio.js"></script>

    <script defer src="assets/scripts/core/main.js"></script>

    <style>
        /* PASSCODE UI (does NOT block Phaser boot) */
        #lock-ui {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #111;
            padding: 25px;
            border-radius: 12px;
            color: white;
            z-index: 999999;
            font-family: system-ui;
        }

        #lock-input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #444;
            background: black;
            color: white;
            font-size: 16px;
        }

        #lock-button {
            margin-top: 12px;
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            background: #80ED33;
            border: none;
            font-weight: 600;
            cursor: pointer;
        }

        #lock-error {
            color: #ff6b6b;
            margin-top: 10px;
            height: 16px;
        }

        /* Input blocker (transparent, allows Phaser to boot) */
        #input-blocker {
            position: fixed;
            inset: 0;
            z-index: 999998;
            background: transparent;
        }

        #lock-watermark {
            position: fixed;
            right: 10px;
            bottom: 8px;
            color: #ccc;
            font-size: 0.8rem;
            font-family: system-ui;
            z-index: 999999;
            pointer-events: none;
        }
    </style>

    <script>
        const PASS = "393546";

        window.addEventListener("DOMContentLoaded", () => {
            const ui = document.getElementById("lock-ui");
            const blocker = document.getElementById("input-blocker");
            const input = document.getElementById("lock-input");
            const button = document.getElementById("lock-button");
            const error = document.getElementById("lock-error");

            function unlock() {
                if (input.value === PASS) {
                    ui.remove();
                    blocker.remove(); // game becomes playable
                } else {
                    error.textContent = "Incorrect passcode.";
                }
            }

            button.onclick = unlock;
            input.onkeydown = e => {
                if (e.key === "Enter") unlock();
            };
        });
    </script>
</head>

<body>

    <!-- Transparent blocker (does NOT freeze Phaser) -->
    <div id="input-blocker"></div>

    <!-- Passcode box -->
    <div id="lock-ui">
        <div style="margin-bottom:10px;font-size:18px;">Enter passcode to access Dih</div>
        <input id="lock-input" type="password" placeholder="Passcode">
        <button id="lock-button">Unlock</button>
        <div id="lock-error"></div>
    </div>

    <!-- Watermark -->
    <div id="lock-watermark">made by adam s & more :)</div>

</body>
</html>
