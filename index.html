<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dih</title>

    <style>
        #lock-overlay {
            position: fixed;
            inset: 0;
            background: #000000dd;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 99999;
            font-family: system-ui;
        }
        #lock-box {
            background: #111;
            border-radius: 12px;
            padding: 24px 28px 32px;
            color: #fff;
            min-width: 260px;
            text-align: center;
        }
        #lock-input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #000;
            color: #fff;
            font-size: 1rem;
        }
        #lock-button {
            margin-top: 14px;
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: none;
            background: #80ED33;
            color: #000;
            font-weight: 600;
            cursor: pointer;
        }
        #lock-error {
            margin-top: 10px;
            color: #ff6b6b;
            font-size: 0.85rem;
        }
        #lock-watermark {
            position: fixed;
            right: 10px;
            bottom: 8px;
            color: #ccc;
            font-size: 0.8rem;
            font-family: system-ui;
            z-index: 100000;
            pointer-events: none;
        }
    </style>

    <script>
        const PASSCODE = "393546";

        function loadGameScripts() {
            const scripts = [
                "assets/scripts/game/allObjects.js?latest",
                "assets/scripts/game/allLevels.js",
                "assets/scripts/libs/phaser.min.js",
                "assets/scripts/libs/pako.min.js",
                "assets/scripts/utils/cache-manager.js",
                "assets/scripts/api/GDapiWrapper.js",
                "assets/scripts/utils/api-config.js",
                "assets/scripts/api/account-api.js",
                "assets/scripts/utils/config.js",
                "assets/scripts/core/triggers.js",
                "assets/scripts/core/level.js?latest",
                "assets/scripts/core/player.js?latehkjthykhst",
                "assets/scripts/core/audio.js",
                "assets/scripts/core/loading-screen.js",
                "assets/scripts/core/level-editor.js?latest",
                "assets/scripts/core/game-scene.js?latest2",
                "assets/scripts/core/main.js"
            ];

            scripts.forEach(src => {
                const s = document.createElement("script");
                s.src = src;
                document.body.appendChild(s);
            });
        }

        window.addEventListener("DOMContentLoaded", () => {
            const overlay = document.getElementById("lock-overlay");
            const input = document.getElementById("lock-input");
            const button = document.getElementById("lock-button");
            const error = document.getElementById("lock-error");

            function unlock() {
                if (input.value === PASSCODE) {
                    overlay.remove();
                    loadGameScripts();
                } else {
                    error.textContent = "Incorrect passcode.";
                }
            }

            button.onclick = unlock;
            input.onkeydown = e => {
                if (e.key === "Enter") unlock();
            };
        });
    </script>
</head>

<body>
    <div id="lock-overlay">
        <div id="lock-box">
            <div>Enter passcode to access Dih</div>
            <input id="lock-input" type="password" placeholder="Passcode">
            <button id="lock-button">Unlock</button>
            <div id="lock-error"></div>
        </div>
    </div>

    <div id="lock-watermark">made by adam s :)</div>
</body>
</html>
